<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/quiz.css">
    <title>Wddd | Quiz</title>
</head>

<body>
    <h1>Css Quiz</h1>
    <form action="" method="post">
        <label for="q1">* What does CSS stand for?</label>
        <input type="text" placeholder="" id="q1" name="q1" required>

        <label for="q2">Explain in your own words what Elements are</label>
        <textarea name="q2" id="q2"></textarea>

        <label for="q3">CSS is used for?</label>
        <select name="q3" id="q3">
            <option value="" selected disabled>Choose one...</option>
            <option value="drawing">drawing</option>
            <option value="painting">Painting</option>
            <option value="styling">styling pages</option>
            <option value="logic">Logic</option>
        </select>

        <label for="q4">What's your age?</label>
        <input type="number" name="q4" id="q4">

        <button type="submit">Submit Quiz</button>

    </form>
</body>

</html>
