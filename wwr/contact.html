<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Welcome to our contact page for JJRC, please reach if you've got any questions">
    <meta name="author" content="Tope Jinad">
    <title>Contact us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwrcrossedoars.png" alt="JJ Rafting logo" id="logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="contact-header">
            <h1>JJ Rafting Company</h1>
            <address>
                <p>123 Orogun area</p>
                <p>Owode, Oyo</p>
                <p>+2349063219493</p>
                <p><a href="mailto:infojj@whitewater.com">infojj@whitewater.com</a></p>
            </address>
        </div>

        <div class="contact-body">
            <iframe class="contact-map"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019!2d-122.4194!3d37.7749!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzfCsDQ2JzI5LjYiTiAxMjLCsDI1JzA5LjgiVw!5e0!3m2!1sen!2sus!4v1234567890"
              height="380" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade" title="JJ Rafting Company Location">
            </iframe>

            <form action="#" method="get" class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>

                <fieldset>
                    <legend>Message Purpose</legend>
                    <label><input type="radio" name="purpose" value="general" required id="purpose">
                        General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation" id="reserve">
                        Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="website" id="website"> Website
                        Suggestion</label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Type here..."
                  required></textarea>

                <label class="checkbox-label">
                    <input type="checkbox" name="newsletter" value="yes" id="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </div>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employees-grid">
                <figure>
                    <img src="images/profile1.jpg" alt="Head River Guide Marcus Rivera">
                    <figcaption>Marcus Rivera<br>Head River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/profile2.jpg" alt="Safety Coordinator Amara Osei">
                    <figcaption>Bobby Osei<br>Safety Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/happyclient.jpg" alt="Customer Experience Lead Rapheal Nair">
                    <figcaption>Rapheal Nair<br>Customer Experience Lead</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <!--  -->
    <footer>
        <p>© 2026 | JJ Rafting Company | Tope Jinad</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="facebook_icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="linkedin_icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png"
                  alt="instagram_icon"></a>
        </nav>
    </footer>
</body>

</html>
